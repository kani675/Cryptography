<!DOCTYPE html>
<html>
<head>
    <title>SHA-512 Step by Step</title>
    <style>
        body {
            font-family: Arial;
            background: #87CEEB;
            padding: 20px;
        }
        .box {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        textarea {
            width: 100%;
            height: 80px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #007acc;
            color: white;
            border: none;
        }
        pre {
            background: #f4faff;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>SHA-512 (Complete 80 Rounds)</h2>
    <textarea id="input">abc</textarea>
    <button onclick="run()">Generate Full Hash</button>
    <pre id="output"></pre>
</div>

<script>
const MASK = (1n << 64n) - 1n;

// Full 80 Constants (K) for SHA-512
const K = [
    0x428a2f98d728ae22n, 0x7137449123ef65cdn, 0xb5c0fbcfec4d3b2fn, 0xe9b5dba58189dbbcn, 0x3956c25bf348b538n, 0x59f111f1b605d019n, 0x923f82a4af194f9bn, 0xab1c5ed5da6d8118n,
    0xd807aa98a3030242n, 0x12835b0145706fben, 0x243185be4ee4b28cn, 0x550c7dc3d5ffb4e2n, 0x72be5d74f27b896fn, 0x80deb1fe3b1696b1n, 0x9bdc06a725c71232n, 0xc19bf174cf692694n,
    0xe49b69c19ef14ad2n, 0xefbe4786384f25e3n, 0x0fc19dc68b8cd5b5n, 0x240ca1cc77ac9c65n, 0x2de92c6f592b0275n, 0x4a7484aa6ea6e483n, 0x5cb0a9dcbd41fbd4n, 0x76f988da831153b5n,
    0x983e5152ee66dfabn, 0xa831c66d2db43210n, 0xb00327c898fb213fn, 0xbf597fc7beef0ee4n, 0xc6e00bf33da88fc2n, 0xd5a79147930aa725n, 0x06ca6351e003826fn, 0x142929670a0e6e70n,
    0x27b70a8546d22ffcn, 0x2e1b21385c26c926n, 0x4d2c6dfc5ac42aedn, 0x53380d139d95b3dfn, 0x650a73548baf63den, 0x766a0abb3c77b2a8n, 0x81c2c92e47edaee6n, 0x92722c851482353bn,
    0xa2bfe8a14cf10364n, 0xa81a664bbc423001n, 0xc24b8b70d0f89791n, 0xc76c51a30654be30n, 0xd192e819d6ef5218n, 0xd69906245565a910n, 0xf40e35855771202an, 0x106aa07032bbd1b8n,
    0x19a4c116b8d2d0c8n, 0x1e376c085141ab53n, 0x2748774cdf8eeb99n, 0x34b0bcb5e19b48a8n, 0x391c0cb3c5c95a63n, 0x4ed8aa4ae3418acbn, 0x5b9cca4f7763e373n, 0x682e6ff3d6b2b8a3n,
    0x748f82ee5defb28fn, 0x78a5636f43172f60n, 0x84c87814a1f0ab72n, 0x8cc702081a6439ecn, 0x90befffa23631e28n, 0xa4506ceb397d2cd9n, 0xbef9a3f751065896n, 0xc67178f2ffd72ebdn,
    0xca5507544ca11040n, 0xd691c7a818caee6bn, 0xd8214a146012c227n, 0xe27334c4b633f72en, 0xec4e771fe462baf1n, 0xf838871d5afc6781n, 0x0811a7a019a0c183n, 0x1231016d50c7722cn,
    0x152e85a047da9489n, 0x1e3198a2d0361841n, 0x2748774c866b64a8n, 0x31c00327410cb2f1n, 0x3c9ebe0a1c599c18n, 0x629a292a361c2b29n, 0x913144192b3c2a1bn, 0xc38491c121e428c8n
];

function rotr(x, n) {
    return ((x >> BigInt(n)) | (x << (64n - BigInt(n)))) & MASK;
}

function run() {
    let out = "";
    const log = (m) => out += m + "\n";
    let msg = document.getElementById("input").value;
    let data = Array.from(new TextEncoder().encode(msg));

    let h = [
        0x6a09e667f3bcc908n, 0xbb67ae8584caa73bn, 0x3c6ef372fe94f82bn, 0xa54ff53a5f1d36f1n,
        0x510e527fade682d1n, 0x9b05688c2b3e6c1fn, 0x1f83d9abfb41bd6bn, 0x5be0cd19137e2179n
    ];

    // Padding Logic
    let bitLen = BigInt(data.length) * 8n;
    data.push(0x80);
    while (data.length % 128 !== 112) data.push(0);
    
    // Append 128-bit length (Big-endian)
    let lenBuf = new ArrayBuffer(16);
    let view = new DataView(lenBuf);
    view.setBigUint64(8, bitLen);
    for(let i=0; i<16; i++) data.push(view.getUint8(i));

    log("Total Padded Length: " + data.length + " bytes");

    // Process 1024-bit blocks
    for (let offset = 0; offset < data.length; offset += 128) {
        let w = new BigUint64Array(80);
        
        // 1. Prepare Message Schedule (W)
        for (let i = 0; i < 16; i++) {
            let idx = offset + (i * 8);
            let val = 0n;
            for(let j=0; j<8; j++) val = (val << 8n) | BigInt(data[idx+j]);
            w[i] = val;
        }

        for (let i = 16; i < 80; i++) {
            let s0 = rotr(w[i-15], 1) ^ rotr(w[i-15], 8) ^ (w[i-15] >> 7n);
            let s1 = rotr(w[i-2], 19) ^ rotr(w[i-2], 61) ^ (w[i-2] >> 6n);
            w[i] = (w[i-16] + s0 + w[i-7] + s1) & MASK;
        }

        let [a, b, c, d, e, f, g, hh] = h;

        // 2. Compression Loop (Full 80 Rounds)
        log("\nProcessing Block at offset " + offset + "...");
        for (let i = 0; i < 80; i++) {
            let S1 = rotr(e, 14) ^ rotr(e, 18) ^ rotr(e, 41);
            let ch = (e & f) ^ ((~e) & g);
            let temp1 = (hh + S1 + ch + K[i] + w[i]) & MASK;
            let S0 = rotr(a, 28) ^ rotr(a, 34) ^ rotr(a, 39);
            let maj = (a & b) ^ (a & c) ^ (b & c);
            let temp2 = (S0 + maj) & MASK;

            hh = g; g = f; f = e;
            e = (d + temp1) & MASK;
            d = c; c = b; b = a;
            a = (temp1 + temp2) & MASK;

            if (i < 3 || i > 77) {
                log(`Round ${i}: a=${a.toString(16).padStart(16,'0')} b=${b.toString(16).padStart(16,'0')} c=${c.toString(16).padStart(16,'0') }d=${d.toString(16).padStart(16,'0')} e=${e.toString(16).padStart(16,'0')} f=${f.toString(16).padStart(16,'0')} g=${g.toString(16).padStart(16,'0')} hh=${hh.toString(16).padStart(16,'0')}  K=${K[i].toString(16).padStart(16,'0')} W=${w[i].toString(16).padStart(16,'0')}`);
            } else if (i === 3) log("... [Rounds 4-77 hidden] ...");
        }

        // Add block result to current hash state
        h[0] = (h[0] + a) & MASK; h[1] = (h[1] + b) & MASK;
        h[2] = (h[2] + c) & MASK; h[3] = (h[3] + d) & MASK;
        h[4] = (h[4] + e) & MASK; h[5] = (h[5] + f) & MASK;
        h[6] = (h[6] + g) & MASK; h[7] = (h[7] + hh) & MASK;
    }

    let finalHash = h.map(x => x.toString(16).padStart(16, '0')).join('');
    log("\nFinal SHA-512 Hash:");
    log(finalHash);

    document.getElementById("output").textContent = out;
}
</script>
</body>

</html>

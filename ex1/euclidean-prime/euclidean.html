<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Euclidean Algorithm - GCD</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #8360c3, #2ebf91);
        font-family: 'Segoe UI', sans-serif;
    }

    .card {
        background: #ffffff;
        width: 480px;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h2 {
        text-align: center;
        color: #333;
    }

    p {
        text-align: center;
        color: #666;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: #20c997;
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #17a589;
    }

    pre {
        margin-top: 15px;
        background: #1e1e2f;
        color: #eaeaea;
        padding: 15px;
        border-radius: 8px;
        max-height: 280px;
        overflow-y: auto;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Euclidean Algorithm</h2>
    <p>GCD using gcd(a,b) = gcd(b, a mod b)</p>

    <input type="number" id="a" placeholder="Enter first number (a)">
    <input type="number" id="b" placeholder="Enter second number (b)">

    <button onclick="findGCD()">Find GCD</button>

    <pre id="output"></pre>
</div>

<script>
function findGCD() {
    let a = parseInt(document.getElementById("a").value);
    let b = parseInt(document.getElementById("b").value);
    let out = document.getElementById("output");

    out.textContent = "";

    if (isNaN(a) || isNaN(b) || a <= 0 || b <= 0) {
        out.textContent = "Please enter two positive integers.";
        return;
    }

    out.textContent += `Using Formula:\n`;
    out.textContent += `gcd(a, b) = gcd(b, a mod b)\n\n`;

    let step = 1;

    while (b !== 0) {
        let r = a % b;

        out.textContent += `Step ${step}:\n`;
        out.textContent += `gcd(${a}, ${b}) = gcd(${b}, ${a} mod ${b})\n`;
        out.textContent += `gcd(${a}, ${b}) = gcd(${b}, ${r})\n\n`;

        a = b;
        b = r;
        step++;
    }

    out.textContent += `Since remainder = 0\n`;
    out.textContent += `GCD = ${a}`;
}
</script>

</body>
</html>

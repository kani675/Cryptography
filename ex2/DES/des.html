<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DES </title>

<style>
body{
  font-family: Consolas, monospace;
  background:#f4f7fb;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
}
button{font-weight:bold}
.output{
  background:#eef2f7;
  padding:15px;
  white-space:pre-wrap;
}
</style>
</head>

<body>
<div class="container">
<h1>DES Implementation </h1>

<input id="text" placeholder="8-bit binary">
<input id="key" placeholder="10-bit binary">

<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>

<div class="output" id="out"></div>
</div>

<script>
// ===== COMMON FUNCTIONS =====
function permute(b,t){ return t.map(i=>b[i-1]).join("") }
function ls(b,n){ return b.slice(n)+b.slice(0,n) }
function xor(a,b){ return a.split("").map((x,i)=>x^b[i]).join("") }
function swap(bits){ return bits.slice(4) + bits.slice(0,4) }

// ===== S-DES TABLES =====
const P10=[3,5,2,7,4,10,1,9,8,6]
const P8=[6,3,7,4,8,5,10,9]
const IP=[2,6,3,1,4,8,5,7]
const IP_INV=[4,1,3,5,7,2,8,6]
const EP=[4,1,2,3,2,3,4,1]

const S0=[[1,0,3,2],[3,2,1,0],[0,2,1,3],[3,1,3,2]]
const S1=[[0,1,2,3],[2,0,1,3],[3,0,1,0],[2,1,0,3]]

function sbox(bits,box){
  let r=parseInt(bits[0]+bits[3],2)
  let c=parseInt(bits[1]+bits[2],2)
  return box[r][c].toString(2).padStart(2,"0")
}

// ===== KEY GENERATION (ONLY K1) =====
function genK1(key, log){
  log.push("Original Key: " + key)

  let p10 = permute(key, P10)
  log.push("After P10: " + p10)

  let L = p10.slice(0,5)
  let R = p10.slice(5)

  L = ls(L,1)
  R = ls(R,1)
  log.push("After LS-1 → L: " + L + " R: " + R)

  let K1 = permute(L+R, P8)
  log.push("Generated K1: " + K1)

  return K1
}

// ===== fK FUNCTION (Feistel, NO P4) =====
function fk(bits, key, log){
  let L = bits.slice(0,4)
  let R = bits.slice(4)
  log.push("L = " + L + " R = " + R)

  let ep = permute(R, EP)
  log.push("EP(R): " + ep)

  let x = xor(ep, key)
  log.push("EP ⊕ K1: " + x)

  let s0 = sbox(x.slice(0,4), S0)
  let s1 = sbox(x.slice(4), S1)
  log.push("S0 Output: " + s0)
  log.push("S1 Output: " + s1)

  let R1 = xor(L, s0 + s1)
  let L1 = R

  log.push("L1 = R (unchanged): " + L1)
  log.push("R1 = L ⊕ (S0S1): " + R1)
  log.push("After fK (L1 || R1): " + L1 + R1)

  return L1 + R1
}

// ===== ENCRYPT =====
function sdesEncrypt(pt, key){
  let log = ["--- DES ENCRYPTION ---\n"]

  let K1 = genK1(key, log)

  let ip = permute(pt, IP)
  log.push("\nAfter IP: " + ip)

  let r = fk(ip, K1, log)

  let ct = permute(r, IP_INV)
  log.push("\nAfter IP⁻¹: " + ct)

  log.push("\nCipher Text: " + ct)
  return log.join("\n")
}

// ===== DECRYPT (WITH SWAP – FIXED) =====
function sdesDecrypt(ct, key){
  let log = ["--- DES DECRYPTION ---\n"]

  let K1 = genK1(key, log)

  let ip = permute(ct, IP)
  log.push("\nAfter IP: " + ip)

  let sw = swap(ip)
  log.push("After SWAP: " + sw)

  let r = fk(sw, K1, log)

  let pt = permute(r, IP_INV)
  log.push("\nAfter IP⁻¹: " + pt)

  log.push("\nPlain Text: " + pt)
  return log.join("\n")
}

// ===== BUTTON HANDLERS =====
function encrypt(){
  out.textContent = sdesEncrypt(text.value.trim(), key.value.trim())
}
function decrypt(){
  out.textContent = sdesDecrypt(text.value.trim(), key.value.trim())
}
</script>
</body>
</html>
